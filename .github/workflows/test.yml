name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      DAGGER_EXTRA_ARGS: --progress plain
    steps:
      - uses: actions/checkout@v5
      - name: Install dagger
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=0.20.3 BIN_DIR=/usr/local/bin sh
      - run: ./run.sh
      - run: ./tangle.sh
      - run: ./check-clean.sh
      - run: ./test-dind.sh

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label ci-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh label create ci-failure --color d93f0b --description "CI is broken" 2>/dev/null || true
            gh issue create \
              --title "CI is red" \
              --label ci-failure \
              --body "Failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

      - name: Report fixed
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label ci-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Fixed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
